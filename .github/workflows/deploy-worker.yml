name: Deploy DBH Forms Worker

on:
  workflow_dispatch:
  push:
    paths:
      - 'daniela-hamberger/worker/**'
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Cloudflare Worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: daniela-hamberger/worker
        run: npm install

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: d6c95a62d86fa0f139a0157897816739
          workingDirectory: daniela-hamberger/worker
          secrets: |
            RESEND_API_KEY
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}


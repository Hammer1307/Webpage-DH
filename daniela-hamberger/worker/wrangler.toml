name = "dbh-forms"
main = "src/index.ts"
compatibility_date = "2025-05-01"

# Environment variables (non-secret). Secrets via `wrangler secret put RESEND_API_KEY`
[vars]
MAIL_TO = "info@danielabrittahamberger.de"
MAIL_FROM = "formular@danielabrittahamberger.de"
ALLOWED_ORIGIN = "https://danielabrittahamberger.de"

# Wenn du Submissions persistieren moechtest, KV anlegen und ID hier eintragen:
# [[kv_namespaces]]
# binding = "SUBMISSIONS"
# id = "<KV_NAMESPACE_ID>"

# Custom Domain Routing
[[routes]]
pattern = "danielabrittahamberger.de/submit"
zone_name = "danielabrittahamberger.de"
